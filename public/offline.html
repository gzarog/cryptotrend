<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – CryptoTrendNotify</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0f1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;padding:1.5rem;text-align:center}
    .card{max-width:380px;border:1px solid rgba(255,255,255,.08);border-radius:1.25rem;padding:2.5rem 2rem;background:rgba(255,255,255,.03);backdrop-filter:blur(12px)}
    .icon{width:64px;height:64px;margin:0 auto 1.5rem;border-radius:1rem;background:linear-gradient(135deg,#22d3ee,#7c3aed);display:flex;align-items:center;justify-content:center}
    .icon svg{width:32px;height:32px;color:#0a0f1a}
    h1{font-size:1.25rem;font-weight:700;margin-bottom:.5rem}
    p{font-size:.875rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
    button{width:100%;padding:.75rem;border:none;border-radius:.75rem;font-size:.875rem;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#22d3ee,#7c3aed);color:#0a0f1a;transition:opacity .2s}
    button:hover{opacity:.85}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01"/></svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. CryptoTrendNotify needs a network connection to fetch live market data.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
