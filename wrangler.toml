name = "cryptotrend"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]
main = "worker/index.ts"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[observability]
enabled = true

# Push notification KV namespaces
# Run: wrangler kv:namespace create PUSH_SUBSCRIPTIONS
#      wrangler kv:namespace create ALERT_COOLDOWNS
#      wrangler kv:namespace create EMAIL_SUBSCRIPTIONS
# Then replace the placeholder IDs below with the real ones.
[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "668dac64b96b40f7895d8c49bc30c805"

[[kv_namespaces]]
binding = "ALERT_COOLDOWNS"
id = "cfdb173091294911b9c9250f90c4c062"

[[kv_namespaces]]
binding = "EMAIL_SUBSCRIPTIONS"
id = "bb6e31167429490faa542b7c9ce980a5"

# Cloudflare Email Workers binding — no third-party API needed.
# Requires Email Routing to be enabled on your domain in the Cloudflare dashboard.
# The FROM_EMAIL address must be on a domain with Email Routing active.
# Docs: https://developers.cloudflare.com/email-routing/email-workers/send-email-workers/
[[send_email]]
name = "EMAIL"

# VAPID public key (safe to commit)
[vars]
VAPID_SUBJECT = "mailto:admin@cryptotrend.app"
VAPID_PUBLIC_KEY = "BMFQ4IxTfLtsjs5eZZkHg74cfXJgpmqVLiDhpQtiaFD73JEZEhDCo-jhNavMBpN3e3OBLkk6gXOoGbETN-hZu0U"
# Replace with an address on your Email Routing-enabled domain:
FROM_EMAIL = "alerts@yourdomain.com"

# VAPID private key — set as a secret (never commit):
# wrangler secret put VAPID_PRIVATE_KEY
# Value: BkERp_XYe9JTJfqg9j2ftq0U08okhqt46sDLNaY9EA0

# Cron: run signal detection + push delivery every 5 minutes
[triggers]
crons = ["*/5 * * * *"]
