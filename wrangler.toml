name = "cryptotrend"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]
main = "worker/index.ts"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[observability]
enabled = true

# Push notification KV namespaces
# Run: wrangler kv:namespace create PUSH_SUBSCRIPTIONS
#      wrangler kv:namespace create ALERT_COOLDOWNS
#      wrangler kv:namespace create EMAIL_SUBSCRIPTIONS
# Then replace the placeholder IDs below with the real ones.
[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "668dac64b96b40f7895d8c49bc30c805"

[[kv_namespaces]]
binding = "ALERT_COOLDOWNS"
id = "cfdb173091294911b9c9250f90c4c062"

[[kv_namespaces]]
binding = "EMAIL_SUBSCRIPTIONS"
id = "bb6e31167429490faa542b7c9ce980a5"

[[kv_namespaces]]
binding = "SIGNAL_CACHE"
id = "REPLACE_WITH_REAL_ID"

# VAPID public key (safe to commit)
[vars]
VAPID_SUBJECT = "mailto:admin@cryptotrend.app"
VAPID_PUBLIC_KEY = "BMFQ4IxTfLtsjs5eZZkHg74cfXJgpmqVLiDhpQtiaFD73JEZEhDCo-jhNavMBpN3e3OBLkk6gXOoGbETN-hZu0U"

# Secrets — set in Cloudflare dashboard → Workers & Pages → cryptotrend → Settings → Variables
# VAPID_PRIVATE_KEY = "..."   (Web Push signing key)
RESEND_API_KEY = "re_EtVmd1Sp_NGQFQRzcKajRGVFcBxQnRimF"

# Cron: run signal detection + push delivery every 5 minutes
[triggers]
crons = ["*/5 * * * *"]
